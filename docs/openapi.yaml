openapi: 3.0.3
info:
  title: Agricultural Federation API
  version: 1.0.0

servers:
  - url: http://localhost:8000

paths:
  /collectivities:
    post:
      summary: Create a new collectivity
      description: Create a collectivity with its initial members and their roles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectivityRequest"
      responses:
        "201":
          description: Collectivity successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectivityResponse"
        "400":
          description: Invalid request
        "403":
          description: Federation authorization denied
        "422":
          description: Business rules not satisfied

  /collectivities/{collectivityId}/members:
    post:
      summary: Add a new member to a collectivity
      description: Add a new member if sponsorship and payment conditions are satisfied.
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Member successfully added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberWithRoleResponse"
        "400":
          description: Invalid request
        "403":
          description: Sponsorship or payment invalid
        "422":
          description: Business rules not satisfied

  /collectivities/{collectivityId}/contributions:
    post:
      summary: Record a contribution
      description: Record a contribution made by a member to a collectivity. Can be periodic (monthly or annual) or exceptional.
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContributionRequest"
      responses:
        "201":
          description: Contribution successfully recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionResponse"
        "400":
          description: Invalid request
        "403":
          description: Unauthorized (only treasurer allowed)
        "422":
          description: Business rules not satisfied

  /accounts:
    post:
      summary: Create a new account
      description: Create an account for a collectivity or the federation.
        Each entity (federation or collectivity) can have multiple bank accounts
        and multiple mobile money accounts, but only one cash account is allowed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
            examples:
              cash_federation:
                value:
                  type: CASH
                  owner_type: FEDERATION
                  holder_name: Federation Cash Box
              bank_collectivity:
                value:
                  type: BANK_TRANSFER
                  owner_type: COLLECTIVITY
                  collectivity_id: 10
                  holder_name: Rice Farmers Group Account
                  bank_name: BRED
                  bank_account_number: "12345678901234567890123"
              mobile_money_collectivity:
                value:
                  type: MOBILE_MONEY
                  owner_type: COLLECTIVITY
                  collectivity_id: 10
                  holder_name: Mobile Wallet Group
                  mobile_money_provider: MVOLA
                  phone_number: "0340000000"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
              examples:
                cash_federation:
                  summary: Cash account for federation
                  value:
                    id: 1
                    type: CASH
                    owner_type: FEDERATION
                    collectivity_id: null
                    holder_name: Federation Cash Box
                    balance: 0
                    currency: MGA
                bank_collectivity:
                  summary: Bank account for a collectivity
                  value:
                    id: 2
                    type: BANK_TRANSFER
                    owner_type: COLLECTIVITY
                    collectivity_id: 10
                    holder_name: Rice Farmers Group Account
                    balance: 0
                    currency: MGA
                    bank_name: BRED
                    bank_account_number: "12345678901234567890123"
                mobile_money_collectivity:
                  summary: Mobile money account for a collectivity
                  value:
                    id: 3
                    type: MOBILE_MONEY
                    owner_type: COLLECTIVITY
                    collectivity_id: 10
                    holder_name: Mobile Wallet Group
                    balance: 0
                    currency: MGA
                    mobile_money_provider: MVOLA
                    phone_number: "0340000000"
        "400":
          description: Invalid request
        "403":
          description: Unauthorized (only treasurer allowed)
        "422":
          description: Business rules not satisfied

components:
  schemas:
    CreateCollectivityRequest:
      type: object
      required:
        - name
        - city
        - agricultural_speciality
        - members
      properties:
        name:
          type: string
        city:
          type: string
        agricultural_speciality:
          type: string
        members:
          type: array
          minItems: 10
          items:
            $ref: "#/components/schemas/MemberWithRoleInput"

    MemberInput:
      type: object
      required:
        - first_name
        - last_name
        - birth_date
        - gender
        - address
        - phone_number
        - occupation
      properties:
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum:
            - male
            - female
        address:
          type: string
        phone_number:
          type: string
        email:
          type: string
          format: email
        occupation:
          type: string

    MemberWithRoleInput:
      type: object
      required:
        - member
        - role
      properties:
        member:
          $ref: "#/components/schemas/MemberInput"
        role:
          type: string
          enum:
            - PRESIDENT
            - PRESIDENT_ADJOINT
            - TREASURER
            - SECRETARY
            - CONFIRMED_MEMBER
            - JUNIOR_MEMBER

    CollectivityResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        agricultural_speciality:
          type: string
        created_at:
          type: string
          format: date
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberWithRoleResponse"

    MemberResponse:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          type: string
        address:
          type: string
        phone_number:
          type: string
        email:
          type: string
        occupation:
          type: string
        join_date:
          type: string
          format: date

    MemberWithRoleResponse:
      type: object
      properties:
        member:
          $ref: "#/components/schemas/MemberResponse"
        role:
          type: string

    CreateMemberRequest:
      type: object
      required:
        - member
        - sponsor_id
        - transaction_reference
      properties:
        member:
          $ref: "#/components/schemas/MemberInput"
        sponsor_id:
          type: integer
          description: Must be a member with > 90 days seniority
        transaction_reference:
          type: string
          description: Proof of 50,000 MGA payment (mobile money or bank transfer reference)

    CreateContributionRequest:
      type: object
      required:
        - member_id
        - amount
        - payment_method
        - type
      properties:
        member_id:
          type: integer
          description: Member who made the contribution
        amount:
          type: number
          format: double
        payment_method:
          type: string
          enum:
            - CASH
            - BANK_TRANSFER
            - MOBILE_MONEY
        type:
          type: string
          enum:
            - MONTHLY
            - ANNUAL
            - EXCEPTIONAL
        payment_provider:
          type: string
          enum:
            - MVOLA
            - ORANGE_MONEY
            - AIRTEL_MONEY
            - BRED
            - MCB
            - BMOI
            - BOA
            - BGFI
            - AFG
            - ACCES_BANQUE
            - BAOBAB
            - SIPEM
        transaction_reference:
          type: string
          description: Required for bank transfer or mobile money
        receipt_number:
          type: string
          description: Required for cash payment
        description:
          type: string
          description: Reason for exceptional contribution

    ContributionResponse:
      type: object
      properties:
        id:
          type: integer
        member_id:
          type: integer
        collectivity_id:
          type: integer
        amount:
          type: number
        payment_method:
          type: string
          enum:
            - CASH
            - BANK_TRANSFER
            - MOBILE_MONEY
        type:
          type: string
          enum:
            - MONTHLY
            - ANNUAL
            - EXCEPTIONAL
        payment_provider:
          type: string
          enum:
            - MVOLA
            - ORANGE_MONEY
            - AIRTEL_MONEY
            - BRED
            - MCB
            - BMOI
            - BOA
            - BGFI
            - AFG
            - ACCES_BANQUE
            - BAOBAB
            - SIPEM
        transaction_reference:
          type: string
          nullable: true
        receipt_number:
          type: string
          nullable: true
        collected_at:
          type: string
          format: date-time

    CreateAccountRequest:
      oneOf:
        - $ref: "#/components/schemas/CreateCashAccount"
        - $ref: "#/components/schemas/CreateBankAccount"
        - $ref: "#/components/schemas/CreateMobileMoneyAccount"
      discriminator:
        propertyName: type
        mapping:
          CASH: "#/components/schemas/CreateCashAccount"
          BANK_TRANSFER: "#/components/schemas/CreateBankAccount"
          MOBILE_MONEY: "#/components/schemas/CreateMobileMoneyAccount"

    AccountResponse:
      oneOf:
        - $ref: "#/components/schemas/CashAccountResponse"
        - $ref: "#/components/schemas/BankAccountResponse"
        - $ref: "#/components/schemas/MobileMoneyAccountResponse"
      discriminator:
        propertyName: type
        mapping:
          CASH: "#/components/schemas/CashAccountResponse"
          BANK_TRANSFER: "#/components/schemas/BankAccountResponse"
          MOBILE_MONEY: "#/components/schemas/MobileMoneyAccountResponse"

    CreateCashAccount:
      type: object
      required:
        - type
        - owner_type
        - holder_name
      properties:
        type:
          type: string
          enum:
            - CASH
        owner_type:
          type: string
          enum:
            - FEDERATION
            - COLLECTIVITY
        collectivity_id:
          type: integer
        holder_name:
          type: string
        balance:
          type: number
          default: 0
        currency:
          type: string
          default: MGA

    CreateBankAccount:
      type: object
      required:
        - type
        - owner_type
        - holder_name
        - bank_name
        - bank_account_number
      properties:
        type:
          type: string
          enum:
            - BANK_TRANSFER
        owner_type:
          type: string
          enum:
            - FEDERATION
            - COLLECTIVITY
        collectivity_id:
          type: integer
        holder_name:
          type: string
        balance:
          type: number
          default: 0
        currency:
          type: string
          default: MGA
        bank_name:
          type: string
          enum:
            - BRED
            - MCB
            - BMOI
            - BOA
            - BGFI
            - AFG
            - ACCES_BANQUE
            - BAOBAB
            - SIPEM
        bank_account_number:
          type: string
          pattern: "^[0-9]{23}$"

    CreateMobileMoneyAccount:
      type: object
      required:
        - type
        - owner_type
        - holder_name
        - mobile_money_provider
        - phone_number
      properties:
        type:
          type: string
          enum:
            - MOBILE_MONEY
        owner_type:
          type: string
          enum:
            - FEDERATION
            - COLLECTIVITY
        collectivity_id:
          type: integer
        holder_name:
          type: string
        balance:
          type: number
          default: 0
        currency:
          type: string
          default: MGA
        mobile_money_provider:
          type: string
          enum:
            - ORANGE_MONEY
            - MVOLA
            - AIRTEL_MONEY
        phone_number:
          type: string

    CashAccountResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
            - CASH
        owner_type:
          type: string
        collectivity_id:
          type: integer
          nullable: true
        holder_name:
          type: string
        balance:
          type: number
        currency:
          type: string

    BankAccountResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
            - BANK_TRANSFER
        owner_type:
          type: string
        collectivity_id:
          type: integer
          nullable: true
        holder_name:
          type: string
        balance:
          type: number
        currency:
          type: string
        bank_name:
          type: string
        bank_account_number:
          type: string

    MobileMoneyAccountResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
           - MOBILE_MONEY
        owner_type:
          type: string
        collectivity_id:
          type: integer
          nullable: true
        holder_name:
          type: string
        balance:
          type: number
        currency:
          type: string
        mobile_money_provider:
          type: string
        phone_number:
          type: string