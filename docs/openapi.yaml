openapi: 3.0.3
info:
  title: Agricultural Federation API
  version: 1.0.0

servers:
  - url: http://localhost:8000

paths:
  /collectivities:
    post:
      summary: Create a new collectivity
      description: Create a collectivity with its initial members and their roles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectivityRequest"
      responses:
        "201":
          description: Collectivity successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectivityResponse"
        "400":
          description: Invalid request
        "403":
          description: Federation authorization denied
        "422":
          description: Business rules not satisfied

  /collectivities/{collectivityId}/members:
    post:
      summary: Add a new member to a collectivity
      description: Add a new member if sponsorship and payment conditions are satisfied.
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Member successfully added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberWithRoleResponse"
        "400":
          description: Invalid request
        "403":
          description: Sponsorship or payment invalid
        "422":
          description: Business rules not satisfied

  /collectivities/{collectivityId}/contributions:
    post:
      summary: Record a contribution
      description: Record a contribution made by a member to a collectivity. Can be periodic (monthly or annual) or exceptional.
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContributionRequest"
      responses:
        "201":
          description: Contribution successfully recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionResponse"
        "400":
          description: Invalid request
        "403":
          description: Unauthorized (only treasurer allowed)
        "422":
          description: Business rules not satisfied

components:
  schemas:
    CreateCollectivityRequest:
      type: object
      required:
        - name
        - city
        - agricultural_speciality
        - members
      properties:
        name:
          type: string
        city:
          type: string
        agricultural_speciality:
          type: string
        members:
          type: array
          minItems: 10
          items:
            $ref: "#/components/schemas/MemberWithRoleInput"

    MemberInput:
      type: object
      required:
        - first_name
        - last_name
        - birth_date
        - gender
        - address
        - phone_number
        - occupation
      properties:
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum:
            - male
            - female
        address:
          type: string
        phone_number:
          type: string
        email:
          type: string
          format: email
        occupation:
          type: string

    MemberWithRoleInput:
      type: object
      required:
        - member
        - role
      properties:
        member:
          $ref: "#/components/schemas/MemberInput"
        role:
          type: string
          enum:
            - PRESIDENT
            - PRESIDENT_ADJOINT
            - TREASURER
            - SECRETARY
            - CONFIRMED_MEMBER
            - JUNIOR_MEMBER

    CollectivityResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        agricultural_speciality:
          type: string
        created_at:
          type: string
          format: date
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberWithRoleResponse"

    MemberResponse:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          type: string
        address:
          type: string
        phone_number:
          type: string
        email:
          type: string
        occupation:
          type: string
        join_date:
          type: string
          format: date

    MemberWithRoleResponse:
      type: object
      properties:
        member:
          $ref: "#/components/schemas/MemberResponse"
        role:
          type: string

    CreateMemberRequest:
      type: object
      required:
        - member
        - sponsor_id
        - transaction_reference
      properties:
        member:
          $ref: "#/components/schemas/MemberInput"
        sponsor_id:
          type: integer
          description: Must be a member with > 90 days seniority
        transaction_reference:
          type: string
          description: Proof of 50,000 MGA payment (mobile money or bank transfer reference)

    CreateContributionRequest:
      type: object
      required:
        - member_id
        - amount
        - payment_method
        - type
      properties:
        member_id:
          type: integer
          description: Member who made the contribution
        amount:
          type: number
          format: double
        payment_method:
          type: string
          enum:
            - CASH
            - BANK_TRANSFER
            - MOBILE_MONEY
        type:
          type: string
          enum:
            - MONTHLY
            - ANNUAL
            - EXCEPTIONAL
        transaction_reference:
          type: string
          description: Required for bank transfer or mobile money
        receipt_number:
          type: string
          description: Required for cash payment
        description:
          type: string
          description: Reason for exceptional contribution

    ContributionResponse:
      type: object
      properties:
        id:
          type: integer
        member_id:
          type: integer
        collectivity_id:
          type: integer
        amount:
          type: number
        payment_method:
          type: string
          enum:
            - CASH
            - BANK_TRANSFER
            - MOBILE_MONEY
        type:
          type: string
          enum:
            - MONTHLY
            - ANNUAL
            - EXCEPTIONAL
        transaction_reference:
          type: string
          nullable: true
        receipt_number:
          type: string
          nullable: true
        collected_at:
          type: string
          format: date-time